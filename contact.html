    <h2>Contact Me</h2>

    <form action="">
        <label for="form_name">Name</label>
        <input id="form_name" type="text" placeholder="Enter your name: ">

        <br>

        <label for="form_email">Email</label>
        <input id="form_email" type="email" placeholder="yourname@example.com">

        <br>

        <label for="form_phone">Phone number</label>
        <input type="tel" id="form_phone">

        <br>

        <label for="country">Country</label>
        <select name="country" id="country">
            <option value="nepal">Nepal</option>
            <option value="usa">USA</option>
            <option value="india">India</option>
            <option value="canada">Canada</option>
        </select>

        <br>

        <label for="form_gender">Gender</label>
        <br>
        <input type="radio" name="form_gender" value="male" id="form_male">
        <label for="form_male">Male</label>
        <input type="radio" name="form_gender" value="female" id="form_female">
        <label for="form_female">Female</label>
        <input type="radio" name="form_gender" value="other" id="form_other">
        <label for="form_other">Other</label>
        <input type="radio" name="form_gender" value="not_prefer" id="form_prefer_not_to_say">
        <label for="form_prefer_not_to_say">Prefer not to say</label>

        <br>
        <label>Hobbies/Interest</label>
        <br>
        <label for="Football">Football</label>
        <input type="checkbox" id="Football" name="Football" value="football">
        <label for="Anime">Anime</label>
        <input type="checkbox" id="Anime" name="Anime" value="anime">
        <label for="Chess">Chess</label>
        <input type="checkbox" id="Chess" name="Chess" value="chess">

        <br>
        <label for="message">Message</label>
        <br>    
        <textarea id="message" name="message" placeholder="Write your message here"></textarea>
        <br>
        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
